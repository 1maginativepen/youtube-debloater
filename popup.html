<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Cleaner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #242424;
      --accent: #ff3c3c;
      --accent-dim: rgba(255, 60, 60, 0.12);
      --text: #f0f0f0;
      --text-muted: #666;
      --green: #3cffa0;
      --green-dim: rgba(60, 255, 160, 0.1);
      --radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      padding: 0;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { width: 20px; height: 20px; fill: white; }

    .header-text h1 {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .header-text p {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
      font-family: 'Space Mono', monospace;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-left: auto;
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Toggles */
    .controls {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }

    .toggle-row:hover { border-color: #333; background: #181818; }
    .toggle-row.active { border-color: var(--accent); background: var(--accent-dim); }

    .toggle-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle-icon {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: background 0.2s;
    }

    .toggle-row.active .toggle-icon { background: rgba(255,60,60,0.2); }

    .toggle-info strong {
      font-size: 13px;
      font-weight: 600;
      display: block;
      color: var(--text);
    }

    .toggle-info span {
      font-size: 10px;
      color: var(--text-muted);
      display: block;
      margin-top: 1px;
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }

    .switch input { display: none; }

    .switch-track {
      position: absolute;
      inset: 0;
      background: #2a2a2a;
      border-radius: 11px;
      transition: background 0.25s;
      border: 1px solid #333;
    }

    .switch input:checked + .switch-track {
      background: var(--accent);
      border-color: var(--accent);
    }

    .switch-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: #666;
      border-radius: 50%;
      transition: transform 0.25s, background 0.25s;
      pointer-events: none;
    }

    .switch input:checked ~ .switch-thumb {
      transform: translateX(16px);
      background: white;
    }

    /* Stats bar */
    .stats {
      margin: 0 16px 12px;
      background: var(--green-dim);
      border: 1px solid rgba(60,255,160,0.2);
      border-radius: var(--radius);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-icon { font-size: 14px; }

    .stats-text {
      font-size: 11px;
      color: var(--green);
      font-family: 'Space Mono', monospace;
    }

    .stats-text strong { font-size: 13px; }

    /* Footer */
    .footer {
      padding: 10px 16px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-note {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
    }

    .refresh-btn {
      font-size: 10px;
      font-family: 'Space Mono', monospace;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Notification toast */
    .toast {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: #1e1e1e;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--green);
      white-space: nowrap;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      z-index: 99;
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <div class="header-text">
      <h1>YT CLEANER</h1>
      <p>distraction-free youtube</p>
    </div>
    <div class="status-dot" id="statusDot" title="Extension active"></div>
  </div>

  <div class="controls">
    <label class="toggle-row" id="row-shorts">
      <div class="toggle-left">
        <div class="toggle-icon">🚫</div>
        <div class="toggle-info">
          <strong>Block Shorts</strong>
          <span>Hides all YouTube Shorts</span>
        </div>
      </div>
      <div class="switch">
        <input type="checkbox" id="blockShorts" />
        <div class="switch-track"></div>
        <div class="switch-thumb"></div>
      </div>
    </label>

    <label class="toggle-row" id="row-recs">
      <div class="toggle-left">
        <div class="toggle-icon">🎯</div>
        <div class="toggle-info">
          <strong>Block Recommendations</strong>
          <span>Removes sidebar + end-screen</span>
        </div>
      </div>
      <div class="switch">
        <input type="checkbox" id="blockRecommendations" />
        <div class="switch-track"></div>
        <div class="switch-thumb"></div>
      </div>
    </label>

    <label class="toggle-row" id="row-ads">
      <div class="toggle-left">
        <div class="toggle-icon">⚡</div>
        <div class="toggle-info">
          <strong>Block Ads</strong>
          <span>Skips & hides video ads</span>
        </div>
      </div>
      <div class="switch">
        <input type="checkbox" id="blockAds" />
        <div class="switch-track"></div>
        <div class="switch-thumb"></div>
      </div>
    </label>
  </div>

  <div class="stats">
    <span class="stats-icon">✨</span>
    <div class="stats-text">
      <strong id="activeCount">3</strong> filters active — enjoy the feed
    </div>
  </div>

  <div class="footer">
    <span class="footer-note">reload tab to apply changes</span>
    <button class="refresh-btn" id="reloadBtn">↺ reload tab</button>
  </div>

  <div class="toast" id="toast">Settings saved!</div>

  <script src="popup.js"></script>
</body>
</html>
